      @keyframes fadeIn { from{opacity:0} to{opacity:1} }
      @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
      .cursor { animation: blink 1.1s step-end infinite; }
      .line1 { animation: fadeIn 0.4s 0.1s both; }
      .line2 { animation: fadeIn 0.4s 0.4s both; }
      .line3 { animation: fadeIn 0.4s 0.7s both; }
      .line4 { animation: fadeIn 0.4s 1.0s both; }
      .line5 { animation: fadeIn 0.4s 1.3s both; }
      .line6 { animation: fadeIn 0.4s 1.6s both; }
      .bigname { animation: fadeIn 0.6s 0.2s both; }
      .sub { animation: fadeIn 0.5s 0.6s both; }
      .badge { animation: fadeIn 0.5s 0.9s both; }
      .skills { animation: fadeIn 0.5s 1.1s both; }
