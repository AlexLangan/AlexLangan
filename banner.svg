      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7df9c2"/>
      <stop offset="50%" style="stop-color:#7db8f9"/>
      <stop offset="100%" style="stop-color:#f97dbb"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7df9c2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7df9c2;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
